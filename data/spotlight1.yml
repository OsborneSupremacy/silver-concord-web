id: "aws-capabilities"
title : "Deep, Hands-On AWS Experience"
content: |
  I build production systems with the AWS services that fit the problem—not a one-size-fits-all stack.
  <br /><br />
  <strong>Compute:</strong> Lambda, ECS, and AWS Batch.<br />
  <strong>Application integration &amp; messaging:</strong> EventBridge, Amazon MQ, SQS, SNS, SES, and End User Messaging.<br />
  <strong>Data &amp; storage:</strong> DynamoDB, Aurora Serverless, S3, EFS, and AWS Transfer Family.<br />
  <strong>Networking &amp; delivery:</strong> VPC, CloudFront, API Gateway, Route 53, and WAF.<br />
  <strong>Security &amp; operations:</strong> IAM, IAM Identity Center, AWS Organizations, KMS, SSM, CloudWatch, GuardDuty, Security Hub, and the AWS Well-Architected Tool.<br />
  <strong>End-user computing:</strong> Amazon WorkSpaces.
